<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Slide Library · PurchasePlus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="assets/PurchasePlus Logos/logo-emblem-mobile.png">
<script src="master-slides/slides-data.js"></script>
<style>
:root {
  --grad:        linear-gradient(90deg, #a956ff 0%, #7c5dff 50%, #3766fe 100%);
  --grad-soft:   linear-gradient(135deg, #f5edff 0%, #eaf1ff 100%);
  --grad-img:    linear-gradient(160deg, #f0e8ff 0%, #e5edff 100%);
  --purple:      #7c5dff;
  --blue:        #3766fe;
  --ink:         #111827;
  --ink-soft:    #1f2937;
  --body:        #4B5563;
  --muted:       #9ca3af;
  --softer:      #fafafa;
  --border:      #e5e7eb;
  --border-soft: #f3f4f6;
  --bg:          #ffffff;
  --green:       #10b981;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); }
body { background: var(--bg); height: 100dvh; overflow: hidden;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--body); font-size: 15px; line-height: 1.6; font-weight: 400;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}
h1, h2, h3, h4, h5, h6, p { text-wrap: balance; color: var(--ink); }
button { font-family: inherit; cursor: pointer; border: 0; background: none; }

.grad {
  background: linear-gradient(90deg, #a956ff 0%, #a956ff 20%, #7c5dff 50%, #3766fe 80%, #3766fe 100%);
  background-size: 220% auto;
  -webkit-background-clip: text; background-clip: text;
  color: transparent; -webkit-text-fill-color: transparent;
  font-weight: 500;
  animation: gradPulse 5s linear infinite;
}
@keyframes gradPulse {
  0%   { background-position: 200% 50%; }
  100% { background-position: 0% 50%; }
}

/* ── App shell — exact hitec ── */
.app { display: grid; grid-template-columns: 300px 1fr; height: 100dvh; }

/* ── Sidebar — exact hitec ── */
.sb {
  background: linear-gradient(180deg, #fafafa 0%, #fff 100%);
  border-right: 1px solid var(--border);
  padding: 22px 16px 18px;
  display: flex; flex-direction: column;
  height: 100dvh; overflow: hidden;
}
.sb-brand {
  display: flex; flex-direction: column; gap: 10px;
  padding: 0 6px 18px;
  border-bottom: 1px solid var(--border-soft);
  margin-bottom: 14px;
}
.sb-brand-top { display: flex; align-items: center; gap: 12px; }
.sb-logo { height: 28px; width: auto; max-width: 200px; object-fit: contain; }
.sb-tagline {
  font-size: 10.5px; font-weight: 400; color: var(--muted);
  letter-spacing: .01em; line-height: 1.4; padding-left: 1px;
}
.sb-eyebrow {
  font-size: 11px; font-weight: 700; letter-spacing: .14em;
  text-transform: uppercase; padding: 0 8px 12px;
}
.sb-list { flex: 1; overflow-y: auto; padding-right: 2px; }
.sb-list::-webkit-scrollbar { width: 4px; }
.sb-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.sb-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 10px 12px; border-radius: 10px; cursor: pointer;
  margin-bottom: 2px; transition: all .15s;
  border: 1px solid transparent; user-select: none;
}
.sb-item:hover { background: var(--softer); }
.sb-item.is-active {
  background: linear-gradient(135deg, rgba(169,86,255,.08) 0%, rgba(55,102,254,.06) 100%);
  border-color: rgba(124,93,255,.22);
}
.sb-item-num {
  font-size: 11px; font-weight: 600; color: var(--muted);
  font-family: 'JetBrains Mono', monospace; min-width: 22px;
  padding-top: 2px; letter-spacing: .04em;
}
.sb-item.is-active .sb-item-num { color: var(--purple); }
.sb-item-label { font-size: 13px; font-weight: 500; color: var(--ink-soft); line-height: 1.35; flex: 1; }
.sb-item.is-active .sb-item-label { color: var(--ink); font-weight: 600; }
.sb-item-count {
  font-size: 10px; font-weight: 600; color: var(--muted);
  font-family: 'JetBrains Mono', monospace; padding-top: 3px;
}
.sb-item.is-active .sb-item-count { color: var(--purple); }

.sb-foot {
  padding-top: 14px; border-top: 1px solid var(--border-soft);
  font-size: 11px; color: var(--muted);
  display: flex; justify-content: space-between; align-items: center; gap: 8px;
}
.sb-foot-hint { display: flex; align-items: center; gap: 6px; }
.sb-counter {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  font-weight: 600; color: var(--muted); white-space: nowrap; letter-spacing: .06em;
}
.sb-progress-wrap { flex: 1; height: 2px; background: var(--border-soft); border-radius: 2px; overflow: hidden; }
.sb-progress-fill { height: 100%; background: var(--grad); border-radius: 2px; transition: width .42s ease; }
.kbd {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 18px; height: 18px; padding: 0 5px;
  font-size: 10px; font-weight: 600; font-family: 'JetBrains Mono', monospace;
  background: #fff; border: 1px solid var(--border); border-radius: 4px;
  color: var(--ink); box-shadow: 0 1px 0 rgba(15,23,42,.04);
}
.dot {
  width: 8px; height: 8px; background: var(--green);
  border-radius: 50%; display: inline-block; flex-shrink: 0;
  box-shadow: 0 0 0 3px rgba(16,185,129,.18);
  animation: pulse 2.4s ease infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 3px rgba(16,185,129,.18); }
  50%       { box-shadow: 0 0 0 7px rgba(16,185,129,.04); }
}

/* ── Main — fills full right panel ── */
.main { position: relative; height: 100dvh; overflow: hidden; }

/* Stage — iframe fills this completely */
.stage {
  position: absolute; inset: 0;
  background: var(--grad-img);
  display: flex; align-items: center; justify-content: center;
}
.stage::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at top right, rgba(169,86,255,.12) 0%, transparent 60%);
  pointer-events: none;
}

/* Two iframes layered for crossfade */
.slide-iframe {
  position: absolute; top: 0; left: 0;
  width: 1400px; height: 875px;
  border: none; display: block;
  transform-origin: top left;
  transition: opacity .38s ease, transform .38s ease;
  will-change: opacity, transform;
}
.slide-iframe.is-front { opacity: 1; z-index: 2; transform-origin: top left; }
.slide-iframe.is-back  { opacity: 0; z-index: 1; transform-origin: top left; }

/* Stage wrapper — sized by JS */
.stage-wrap {
  position: relative;
  /* width/height set by JS */
}

/* Empty state */
.empty-state {
  position: absolute; inset: 0; z-index: 10;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; text-align: center; background: var(--grad-img);
}
.empty-title { font-size: 20px; font-weight: 600; color: var(--ink); }
.empty-body  { font-size: 14px; color: var(--body); max-width: 30ch; line-height: 1.6; }

/* Overlay controls — appear on hover */
.overlay-ctrl {
  position: absolute; top: 18px; right: 18px; z-index: 20;
  display: flex; gap: 6px; align-items: center;
  opacity: 0; transition: opacity .2s;
  pointer-events: none;
}
.main:hover .overlay-ctrl { opacity: 1; pointer-events: auto; }
.ctrl-btn {
  padding: 5px 11px; border-radius: 7px; font-size: 11px; font-weight: 600;
  background: rgba(255,255,255,.88); border: 1px solid rgba(229,231,235,.9);
  color: var(--body); cursor: pointer; transition: all .12s; white-space: nowrap;
  backdrop-filter: blur(10px);
}
.ctrl-btn:hover { background: #fff; color: var(--ink); }
.ctrl-btn.hi { color: var(--purple); border-color: rgba(124,93,255,.3); }

/* Slide nav arrows — overlaid left/right of stage */
.nav-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 40px; height: 40px; border-radius: 50%; z-index: 15;
  background: rgba(255,255,255,.88); border: 1px solid rgba(229,231,235,.8);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--ink-soft);
  box-shadow: 0 2px 12px rgba(15,23,42,.12);
  transition: all .16s; backdrop-filter: blur(8px);
  opacity: 0;
}
.main:hover .nav-arrow { opacity: 1; }
.nav-arrow:hover { background: #fff; color: var(--purple); box-shadow: 0 4px 20px rgba(124,93,255,.2); }
.nav-arrow.is-disabled { opacity: 0 !important; pointer-events: none; }
.nav-arrow svg { width: 18px; height: 18px; }
#navPrev { left: 16px; }
#navNext { right: 16px; }

/* Fullscreen modal */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,.92); backdrop-filter: blur(16px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .22s;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal-inner { width: 96vw; max-width: 1300px; display: flex; flex-direction: column; gap: 10px; }
.modal-bar { display: flex; align-items: center; gap: 10px; }
.modal-title { font-size: 13px; font-weight: 700; color: rgba(255,255,255,.85); flex: 1; }
.modal-close {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,.15); border: none;
  display: flex; align-items: center; justify-content: center;
  color: #fff; cursor: pointer; font-size: 15px; transition: background .15s;
}
.modal-close:hover { background: rgba(255,255,255,.28); }
.modal-slide {
  width: 100%; aspect-ratio: 16/10; border-radius: 10px; overflow: hidden;
  background: #fff; box-shadow: 0 24px 64px rgba(0,0,0,.55);
}
.modal-slide iframe { width: 1400px; height: 875px; border: none; display: block; transform-origin: top left; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 500;
  background: var(--ink); border-radius: 8px; padding: 10px 16px;
  font-size: 13px; color: #fff; font-weight: 500;
  box-shadow: 0 4px 20px rgba(15,23,42,.25);
  opacity: 0; transform: translateY(8px);
  transition: opacity .2s, transform .2s; pointer-events: none;
}
.toast.show { opacity: 1; transform: none; }
.toast.success { background: #065f46; }
</style>
</head>
<body>

<div class="app">

  <!-- Sidebar — exact hitec structure -->
  <aside class="sb">
    <div class="sb-brand">
      <div class="sb-brand-top">
        <img class="sb-logo" src="assets/PurchasePlus Logos/logo-horizontal-color.png" alt="PurchasePlus">
      </div>
      <div class="sb-tagline">Master Slide Library · 136 slides · 16 categories</div>
    </div>

    <div class="sb-eyebrow grad" id="sbEyebrow">Slide Library</div>

    <div class="sb-list" id="sbList"></div>

    <div class="sb-foot">
      <span class="sb-counter" id="sbCounter">-- / --</span>
      <div class="sb-progress-wrap"><div class="sb-progress-fill" id="sbProgress"></div></div>
      <div class="sb-foot-hint">
        <span class="kbd">↑</span><span class="kbd">↓</span>
      </div>
      <span class="dot"></span>
    </div>
  </aside>

  <!-- Main — slide fills this entirely -->
  <main class="main" id="main">

    <!-- Slide stage -->
    <div class="stage" id="stage">
      <div class="stage-wrap" id="stageWrap">
        <iframe class="slide-iframe is-front" id="iframeA" title="Slide A"></iframe>
        <iframe class="slide-iframe is-back"  id="iframeB" title="Slide B"></iframe>
      </div>
    </div>

    <!-- Empty state (shown before category selected) -->
    <div class="empty-state" id="emptyState">
      <div class="empty-title">Select a category</div>
      <div class="empty-body">Choose a slide category from the sidebar to begin browsing.</div>
    </div>

    <!-- Navigation arrows -->
    <button class="nav-arrow is-disabled" id="navPrev" aria-label="Previous slide">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="nav-arrow is-disabled" id="navNext" aria-label="Next slide">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

    <!-- Hover controls -->
    <div class="overlay-ctrl">
      <button class="ctrl-btn" onclick="copySlideHtml()">Copy HTML</button>
      <button class="ctrl-btn hi" onclick="openFullscreen()">Full Screen</button>
    </div>

  </main>
</div>

<!-- Fullscreen modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-inner">
    <div class="modal-bar">
      <span class="modal-title" id="modalTitle"></span>
      <button class="modal-close" onclick="closeFullscreen()">&#x2715;</button>
    </div>
    <div class="modal-slide" id="modalSlide">
      <iframe id="modalFrame" title="Fullscreen slide"></iframe>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {

var currentMode  = 'light';
var currentCat   = -1;
var currentIdx   = 0;
var slides       = [];
var transitioning = false;
var frontIsA     = true; /* which iframe is visible */

var iframeA  = document.getElementById('iframeA');
var iframeB  = document.getElementById('iframeB');
var stageWrap = document.getElementById('stageWrap');
var emptyState = document.getElementById('emptyState');
var navPrev  = document.getElementById('navPrev');
var navNext  = document.getElementById('navNext');

var cats = [
  { num:'01', name:'Cover / Opening',         count:10, catInt:1 },
  { num:'02', name:'Storytelling / Narrative', count:10, catInt:2 },
  { num:'03', name:'Company / Business',       count: 8, catInt:3 },
  { num:'04', name:'Product / Service',        count: 8, catInt:4 },
  { num:'05', name:'Sales / Marketing',        count:10, catInt:5 },
  { num:'06', name:'Data / Analytics / KPI',   count: 8, catInt:6 },
  { num:'07', name:'Charts / Graphs',          count: 8, catInt:7 },
  { num:'08', name:'Financial / Investor',     count: 8, catInt:8 },
  { num:'09', name:'CRM / Ops / Process',      count:10, catInt:9 },
  { num:'10', name:'AI / Tech / Engineering',  count:10, catInt:10 },
  { num:'11', name:'Visual / Media',           count: 8, catInt:11 },
  { num:'12', name:'Tables / Comparison',      count: 8, catInt:12 },
  { num:'13', name:'Roadmap / Timeline',       count: 8, catInt:13 },
  { num:'14', name:'Workshop / Consulting',    count: 8, catInt:14 },
  { num:'15', name:'Ending / CTA',             count: 8, catInt:15 },
  { num:'16', name:'Appendix / Backup',        count: 6, catInt:16 },
];

/* ── Build sidebar ── */
var sbList = document.getElementById('sbList');
cats.forEach(function(cat, idx) {
  var el = document.createElement('div');
  el.className = 'sb-item';
  el.dataset.idx = idx;
  el.innerHTML =
    '<span class="sb-item-num">' + cat.num + '</span>' +
    '<span class="sb-item-label">' + cat.name + '</span>' +
    '<span class="sb-item-count">' + cat.count + '</span>';
  el.addEventListener('click', function() { loadCat(idx); });
  sbList.appendChild(el);
});

/* ── Load a category ── */
window.loadCat = function(idx) {
  currentCat = idx;
  var cat = cats[idx];

  document.querySelectorAll('.sb-item').forEach(function(el) {
    el.classList.toggle('is-active', parseInt(el.dataset.idx) === idx);
  });
  document.getElementById('sbEyebrow').textContent = cat.num + ' — ' + cat.name;

  var data = window._slidesData || [];
  slides = data.filter(function(s) { return s.catInt === cat.catInt; });
  currentIdx = 0;

  if (!slides.length) {
    emptyState.style.display = '';
    return;
  }
  emptyState.style.display = 'none';

  /* Load first slide directly into front iframe, no transition */
  getFront().srcdoc = buildSlideDoc(slides[0].html);
  getFront().onload = function() { scaleStage(); updateChrome(); };
  getBack().srcdoc = '';
};

/* ── Navigate to slide ── */
function goToSlide(idx) {
  if (transitioning || !slides.length) return;
  if (idx < 0 || idx >= slides.length) return;
  if (idx === currentIdx) return;

  transitioning = true;
  var slide = slides[idx];
  var back = getBack();

  back.srcdoc = buildSlideDoc(slide.html);
  back.onload = function() {
    scaleStage();
    /* Crossfade */
    back.classList.remove('is-back');  back.classList.add('is-front');
    getFront().classList.remove('is-front'); getFront().classList.add('is-back');
    frontIsA = !frontIsA;
    currentIdx = idx;
    updateChrome();
    setTimeout(function() { transitioning = false; }, 420);
  };
}

function getFront() { return frontIsA ? iframeA : iframeB; }
function getBack()  { return frontIsA ? iframeB : iframeA; }

/* ── Update sidebar counter + nav state ── */
function updateChrome() {
  var total = slides.length;
  var padded = String(currentIdx + 1).padStart(2, '0') + ' / ' + String(total).padStart(2, '0');
  document.getElementById('sbCounter').textContent = padded;
  document.getElementById('sbProgress').style.width = (((currentIdx + 1) / total) * 100) + '%';
  navPrev.classList.toggle('is-disabled', currentIdx === 0);
  navNext.classList.toggle('is-disabled', currentIdx === total - 1);
}

/* ── Scale iframe to fill main panel ── */
function scaleStage() {
  var main = document.getElementById('main');
  var w = main.offsetWidth;
  var h = main.offsetHeight;
  var scale = Math.min(w / 1400, h / 875);
  var sw = Math.round(1400 * scale);
  var sh = Math.round(875 * scale);
  stageWrap.style.width  = sw + 'px';
  stageWrap.style.height = sh + 'px';
  iframeA.style.transform = 'scale(' + scale + ')';
  iframeB.style.transform = 'scale(' + scale + ')';
}
window.addEventListener('resize', debounce(scaleStage, 60));

/* ── Build slide document ── */
function buildSlideDoc(html) {
  var css  = window._libraryCss || '';
  var base = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
  var tidy = '.slide-type-tag,.slide-divider{display:none!important}' +
             '.slide-wrapper{padding:0!important;margin:0!important;background:transparent!important;border:none!important;box-shadow:none!important;}';
  return '<!DOCTYPE html><html lang="en" data-mode="' + currentMode + '">' +
    '<head><meta charset="UTF-8">' +
    '<base href="' + base + '">' +
    '<link rel="preconnect" href="https://fonts.googleapis.com">' +
    '<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">' +
    '<style>*{box-sizing:border-box;margin:0;padding:0;}html,body{width:1400px;height:875px;overflow:hidden;background:#fff;}</style>' +
    '<style>' + css + '</style>' +
    '<style>' + tidy + '</style>' +
    '</head><body>' + html + '</body></html>';
}

/* ── Nav buttons ── */
navPrev.addEventListener('click', function() { goToSlide(currentIdx - 1); });
navNext.addEventListener('click', function() { goToSlide(currentIdx + 1); });

/* ── Keyboard ── */
document.addEventListener('keydown', function(e) {
  if (document.getElementById('modalOverlay').classList.contains('show')) {
    if (e.key === 'Escape') closeFullscreen();
    return;
  }
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
    e.preventDefault(); goToSlide(currentIdx + 1);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault(); goToSlide(currentIdx - 1);
  }
});

/* ── Copy HTML ── */
window.copySlideHtml = function() {
  var s = slides[currentIdx];
  if (!s) return;
  navigator.clipboard.writeText(s.html)
    .then(function() { showToast('HTML copied', 'success'); })
    .catch(function() { showToast('Copy failed'); });
};

/* ── Fullscreen ── */
window.openFullscreen = function() {
  var s = slides[currentIdx];
  if (!s) return;
  document.getElementById('modalTitle').textContent = s.title;
  var mf = document.getElementById('modalFrame');
  mf.srcdoc = buildSlideDoc(s.html);
  mf.onload = function() {
    var ms = document.getElementById('modalSlide');
    var scale = ms.offsetWidth / 1400;
    mf.style.transform = 'scale(' + scale + ')';
    ms.style.height = Math.round(875 * scale) + 'px';
  };
  document.getElementById('modalOverlay').classList.add('show');
};
window.closeFullscreen = function() { document.getElementById('modalOverlay').classList.remove('show'); };
window.closeModal = function(e) {
  if (e.target === document.getElementById('modalOverlay')) closeFullscreen();
};

/* ── Toast ── */
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(function() { t.className = 'toast'; }, 2600);
}

function debounce(fn, ms) {
  var t; return function() { clearTimeout(t); t = setTimeout(fn, ms); };
}

/* ── Init ── */
loadCat(0);

})();
</script>
</body>
</html>
